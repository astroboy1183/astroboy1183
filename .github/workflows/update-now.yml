name: Update Now section

# Refreshes the self-updating 🔄 Now block in the profile README with
# yesterday's facts — runs after the agent fleet's 06:00 IST wave.
on:
  schedule:
    - cron: '45 0 * * *'   # 06:15 IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Rebuild the Now block
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_now.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain README.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Now: daily refresh"
            git pull --rebase -q origin main || true
            git push
          fi